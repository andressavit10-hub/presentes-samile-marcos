<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samile & Marcos — Lista de Presentes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#F1F4FC;
    --surface:#FFFFFF;
    --text:#1A2140;
    --text-soft:#6B7299;
    --rose:#2946C7;
    --rose-dark:#1B2F8F;
    --rose-pale:#E8EBFA;
    --gold:#2946C7;
    --sage:#2F7A4F;
    --sage-pale:#E6F4EC;
    --danger:#B3372E;
    --border:#DCE1F2;
    --radius:14px;
    --shadow:0 8px 24px rgba(26,33,64,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Assistant',sans-serif;
    font-size:16px;
    line-height:1.5;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    color:var(--text);
    margin:0;
  }
  ::selection{ background:var(--rose-pale); }
  a{color:var(--rose-dark);}
  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline:2px solid var(--rose-dark); outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }

  /* ---------- Layout shells ---------- */
  .app{ min-height:100vh; display:flex; flex-direction:column; }
  .hidden{ display:none !important; }

  /* ---------- Header / monogram ---------- */
  .site-header{
    padding:56px 24px 32px;
    text-align:center;
  }
  .monogram{
    width:78px; height:78px; margin:0 auto 18px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif;
    font-size:28px; font-style:italic; color:var(--gold);
    letter-spacing:1px;
  }
  .site-header h1{ font-size:44px; font-style:italic; }
  .site-header .sub{
    margin-top:10px; color:var(--text-soft); font-size:15px;
    letter-spacing:.04em; text-transform:uppercase;
  }
  .divider{
    width:60px; height:1px; background:var(--gold); margin:22px auto 0; opacity:.7;
  }

  /* ---------- Gift grid ---------- */
  .gifts-wrap{ max-width:1080px; margin:0 auto; padding:8px 24px 80px; width:100%; }
  .section-title{ text-align:center; font-size:26px; margin-bottom:36px; font-style:italic; }
  .gift-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:22px;
  }
  .gift-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .gift-card:hover{ transform:translateY(-3px); box-shadow:0 14px 30px rgba(59,36,49,0.12); }
  .gift-img{
    width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--rose-pale);
  }
  .gift-body{ padding:16px 16px 18px; display:flex; flex-direction:column; gap:10px; flex:1; }
  .gift-name{ font-size:16px; font-weight:600; min-height:44px; }
  .gift-price{ color:var(--rose-dark); font-weight:700; font-size:17px; }
  .gift-select{
    margin-top:auto;
    background:var(--rose); color:#fff; border:none; border-radius:999px;
    padding:10px 16px; font-weight:600; font-size:14px;
    transition:background .15s ease;
  }
  .gift-select:hover{ background:var(--rose-dark); }
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-soft);
  }

  /* ---------- Footer ---------- */
  .site-footer{
    text-align:center; padding:30px 20px 50px; color:var(--text-soft); font-size:13px;
  }
  .admin-link{
    background:none; border:none; color:var(--text-soft); text-decoration:underline;
    font-size:13px; cursor:pointer;
  }

  /* ---------- Modals ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(26,33,64,0.45);
    display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:100;
  }
  .modal{
    background:var(--surface); border-radius:18px; max-width:440px; width:100%;
    padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.25);
    max-height:88vh; overflow-y:auto;
    animation:pop .18s ease;
  }
  @keyframes pop{ from{ opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);} }
  .modal h2{ font-size:24px; font-style:italic; margin-bottom:6px; }
  .modal .muted{ color:var(--text-soft); font-size:14px; margin-bottom:20px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-soft); }
  .field input, .field textarea{
    width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:10px;
    font-family:inherit; font-size:15px; background:#fff; color:var(--text);
  }
  .field textarea{ min-height:90px; resize:vertical; }
  .summary-row{
    display:flex; justify-content:space-between; padding:10px 0;
    border-bottom:1px solid var(--border); font-size:15px;
  }
  .summary-row.total{ font-weight:700; color:var(--rose-dark); font-size:17px; border-bottom:none; }
  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .btn{
    border:none; border-radius:999px; padding:12px 18px; font-weight:600; font-size:14.5px; flex:1;
    transition:background .15s ease, opacity .15s ease;
  }
  .btn-primary{ background:var(--rose); color:#fff; }
  .btn-primary:hover{ background:var(--rose-dark); }
  .btn-ghost{ background:var(--rose-pale); color:var(--rose-dark); }
  .btn-ghost:hover{ opacity:.85; }
  .btn-sage{ background:var(--sage); color:#fff; }
  .btn-sage:hover{ opacity:.9; }
  .error-msg{ color:var(--danger); font-size:13px; margin-top:-8px; margin-bottom:14px; display:none; }

  .pix-box{
    text-align:center; background:var(--rose-pale); border-radius:14px; padding:22px 16px; margin-bottom:18px;
  }
  #qrcode-container{ display:flex; justify-content:center; margin-bottom:14px; }
  #qrcode-container img, #qrcode-container canvas{ border-radius:10px; background:#fff; padding:8px; }
  .pix-key-row{
    display:flex; align-items:center; gap:8px; background:#fff; border-radius:10px;
    padding:10px 12px; font-size:13.5px; word-break:break-all; text-align:left;
  }
  .copy-btn{
    background:var(--rose-dark); color:#fff; border:none; border-radius:8px; padding:8px 12px;
    font-size:12.5px; white-space:nowrap; flex-shrink:0;
  }
  .thanks-icon{ font-size:44px; text-align:center; margin-bottom:10px; }
  .thanks-text{ text-align:center; font-size:17px; line-height:1.6; font-style:italic; font-family:'Cormorant Garamond',serif; }

  /* ---------- Admin ---------- */
  .admin-shell{ max-width:980px; margin:0 auto; padding:32px 20px 80px; width:100%; }
  .admin-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .tabs{ display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
  .tab-btn{
    background:var(--surface); border:1px solid var(--border); border-radius:999px;
    padding:9px 18px; font-size:14px; font-weight:600; color:var(--text-soft);
  }
  .tab-btn.active{ background:var(--rose); color:#fff; border-color:var(--rose); }
  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); margin-bottom:24px; }
  .panel h3{ font-size:20px; font-style:italic; margin-bottom:18px; }
  .admin-gift-row{
    display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--border);
  }
  .admin-gift-row:last-child{ border-bottom:none; }
  .admin-thumb{ width:64px; height:64px; border-radius:8px; object-fit:cover; background:var(--rose-pale); flex-shrink:0; }
  .admin-fields{ flex:1; display:flex; gap:10px; flex-wrap:wrap; }
  .admin-fields input{
    border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-family:inherit; font-size:14px;
  }
  .admin-fields input.name-input{ flex:2; min-width:140px; }
  .admin-fields input.price-input{ width:110px; }
  .row-actions{ display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .icon-btn{
    background:var(--rose-pale); border:none; border-radius:8px; width:32px; height:32px;
    font-size:14px; color:var(--rose-dark); display:flex; align-items:center; justify-content:center;
  }
  .icon-btn.danger{ background:#F6E3E1; color:var(--danger); }
  .icon-btn:disabled{ opacity:.35; cursor:default; }
  .file-btn{
    background:var(--rose-pale); color:var(--rose-dark); border:none; border-radius:8px;
    padding:8px 10px; font-size:12.5px; font-weight:600; flex-shrink:0;
  }
  .add-gift-form{ border:1.5px dashed var(--border); border-radius:12px; padding:18px; margin-top:16px; }
  .add-gift-form .row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .add-gift-form input.name-input{ flex:2; min-width:160px; }
  .add-gift-form input.price-input{ width:120px; }
  .preview-thumb{ width:52px; height:52px; border-radius:8px; object-fit:cover; background:var(--rose-pale); }
  .save-toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--text); color:#fff; padding:9px 18px; border-radius:999px; font-size:13px;
    opacity:0; transition:opacity .25s ease; z-index:200; pointer-events:none;
  }
  .save-toast.show{ opacity:.92; }

  table.res-table{ width:100%; border-collapse:collapse; font-size:14px; }
  table.res-table th{ text-align:left; padding:8px; color:var(--text-soft); font-size:12.5px; text-transform:uppercase; letter-spacing:.03em; border-bottom:1px solid var(--border); }
  table.res-table td{ padding:10px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
  .status-pill{ padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; white-space:nowrap; }
  .status-pill.confirmado{ background:var(--sage-pale); color:var(--sage); }
  .status-pill.aguardando{ background:#FBF0DE; color:#A9822F; }
  .msg-cell{ max-width:260px; white-space:pre-wrap; }

  .settings-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:600px){ .settings-grid{ grid-template-columns:1fr; } }
  .settings-grid .field{ margin-bottom:0; }
  .save-settings-btn{ margin-top:18px; }

  .login-box{ max-width:340px; margin:80px auto; }
</style>
</head>
<body>
<div id="app" class="app"></div>
<div id="modal-root"></div>
<div id="toast" class="save-toast"></div>

<script>
/* ================= DATA ================= */
const PLACEHOLDER_IMG = "data:image/svg+xml;utf8," + encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='300' height='300' fill='%23E8EBFA'/><text x='50%' y='52%' font-family='Georgia' font-size='20' fill='%231B2F8F' text-anchor='middle'>presente</text></svg>`
);

const DEFAULT_SETTINGS = {
  pixKey: "",
  accountName: "Samile e Marcos",
  city: "SALVADOR",
  adminPassword: "casamento2026"
};

const DEFAULT_GIFTS = [
  { id: "ex1", name: "Exemplo — Jogo de Panelas", price: 350, image: PLACEHOLDER_IMG, order: 0 },
  { id: "ex2", name: "Exemplo — Jantar Romântico", price: 250, image: PLACEHOLDER_IMG, order: 1 },
  { id: "ex3", name: "Exemplo — Lua de Mel (cota)", price: 500, image: PLACEHOLDER_IMG, order: 2 }
];

let gifts = [];
let reservations = [];
let settings = {};
let view = "guest";       // guest | admin
let adminAuthed = false;
let adminTab = "gifts";   // gifts | reservations | settings
let newGiftDraft = { name: "", price: "", image: "" };
let currentGiftForPurchase = null;
let currentReservationDraft = null;
let currentReservationId = null;

/* ================= STORAGE HELPERS ================= */
async function safeGet(key, fallback){
  try{
    const r = await window.storage.get(key, true);
    return r && r.value ? JSON.parse(r.value) : fallback;
  }catch(e){
    return fallback;
  }
}
async function saveGifts(){ try{ await window.storage.set('gifts', JSON.stringify(gifts), true); showToast('Salvo'); }catch(e){ showToast('Erro ao salvar — tente novamente'); } }
async function saveReservations(){ try{ await window.storage.set('reservations', JSON.stringify(reservations), true); }catch(e){ /* silent */ } }
async function saveSettings(){ try{ await window.storage.set('settings', JSON.stringify(settings), true); showToast('Configurações salvas'); }catch(e){ showToast('Erro ao salvar'); } }

let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1400);
}

async function loadAll(){
  gifts = await safeGet('gifts', null);
  if(!gifts){ gifts = DEFAULT_GIFTS.slice(); await saveGiftsSilent(); }
  reservations = await safeGet('reservations', []);
  settings = await safeGet('settings', null);
  if(!settings){ settings = {...DEFAULT_SETTINGS}; await window.storage.set('settings', JSON.stringify(settings), true); }
}
async function saveGiftsSilent(){ try{ await window.storage.set('gifts', JSON.stringify(gifts), true); }catch(e){} }

/* ================= UTIL ================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function formatBRL(n){ const v = Number(n)||0; return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function escapeHtml(str){
  return String(str==null?'':str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

/* ================= PIX BR CODE (EMV) ================= */
function crc16(payload){
  let polynomial = 0x1021, result = 0xFFFF;
  for(let i=0;i<payload.length;i++){
    result ^= (payload.charCodeAt(i) << 8);
    for(let j=0;j<8;j++){
      result = (result & 0x8000) ? ((result << 1) ^ polynomial) : (result << 1);
      result &= 0xFFFF;
    }
  }
  return result.toString(16).toUpperCase().padStart(4,'0');
}
function tlv(id, value){ const len = String(value.length).padStart(2,'0'); return `${id}${len}${value}`; }
function normalizePixText(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'').toUpperCase();
}
function buildPixPayload({ pixKey, name, city, amount, txid }){
  const merchantName = normalizePixText(name).substring(0,25) || "RECEBEDOR";
  const merchantCity = normalizePixText(city).substring(0,15) || "BRASIL";
  const cleanTxid = (txid||'PRESENTE').replace(/[^A-Za-z0-9]/g,'').substring(0,25) || 'PRESENTE';
  const merchantAccountInfo = tlv('26', tlv('00','br.gov.bcb.pix') + tlv('01', pixKey));
  const amountStr = Number(amount).toFixed(2);
  let payload =
    tlv('00','01') +
    merchantAccountInfo +
    tlv('52','0000') +
    tlv('53','986') +
    tlv('54', amountStr) +
    tlv('58','BR') +
    tlv('59', merchantName) +
    tlv('60', merchantCity) +
    tlv('62', tlv('05', cleanTxid));
  payload += '6304';
  return payload + crc16(payload);
}

/* ================= RENDER: GUEST VIEW ================= */
function renderGuestGifts(){
  const sorted = [...gifts].sort((a,b)=>a.order-b.order);
  if(sorted.length === 0){
    return `<div class="empty-state">A lista de presentes ainda está sendo preparada. Volte em breve! 💛</div>`;
  }
  return `<div class="gift-grid">` + sorted.map(g => `
    <div class="gift-card">
      <img class="gift-img" src="${g.image || PLACEHOLDER_IMG}" alt="${escapeHtml(g.name)}">
      <div class="gift-body">
        <div class="gift-name">${escapeHtml(g.name)}</div>
        <div class="gift-price">${formatBRL(g.price)}</div>
        <button class="gift-select" onclick="openPurchaseModal('${g.id}')">Presentear</button>
      </div>
    </div>
  `).join('') + `</div>`;
}

function renderGuestView(){
  return `
    <div class="site-header">
      <div class="monogram">S<span style="font-size:14px;margin:0 2px;">&amp;</span>M</div>
      <h1>Samile &amp; Marcos</h1>
      <div class="sub">Lista de Presentes</div>
      <div class="divider"></div>
    </div>
    <div class="gifts-wrap">
      <div class="section-title">Presentes Virtuais</div>
      ${renderGuestGifts()}
    </div>
    <div class="site-footer">
      <div>Com carinho, obrigado por fazer parte do nosso dia. 🤍</div>
    </div>
  `;
}

/* ================= MODALS: GUEST FLOW ================= */
function openPurchaseModal(giftId){
  const g = gifts.find(x=>x.id===giftId);
  if(!g) return;
  currentGiftForPurchase = g;
  const modalRoot = document.getElementById('modal-root');
  modalRoot.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h2>Resumo da sua escolha</h2>
        <div class="muted">Você está presenteando os noivos com carinho.</div>
        <div class="summary-row"><span>${escapeHtml(g.name)}</span><span>${formatBRL(g.price)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${formatBRL(g.price)}</span></div>

        <div class="field" style="margin-top:20px;">
          <label>Seu nome *</label>
          <input id="pf-name" type="text" placeholder="Como devemos te chamar">
        </div>
        <div class="field">
          <label>Seu e-mail *</label>
          <input id="pf-email" type="email" placeholder="seuemail@exemplo.com">
        </div>
        <div class="field">
          <label>Deixe uma mensagem para os noivos (opcional)</label>
          <textarea id="pf-msg" placeholder="Escreva sua mensagem de carinho..."></textarea>
        </div>
        <div id="pf-error" class="error-msg">Preencha nome e e-mail válidos para continuar.</div>

        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Voltar</button>
          <button class="btn btn-primary" onclick="proceedToPix()">Prosseguir</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('pf-name').focus();
}

function proceedToPix(){
  const name = document.getElementById('pf-name').value.trim();
  const email = document.getElementById('pf-email').value.trim();
  const msg = document.getElementById('pf-msg').value.trim();
  const errEl = document.getElementById('pf-error');
  if(!name || !isValidEmail(email)){
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const reservation = {
    id: uid(),
    giftId: currentGiftForPurchase.id,
    giftName: currentGiftForPurchase.name,
    amount: currentGiftForPurchase.price,
    guestName: name,
    guestEmail: email,
    message: msg,
    status: 'aguardando',
    timestamp: new Date().toISOString()
  };
  reservations.push(reservation);
  currentReservationId = reservation.id;
  saveReservations();
  openPixModal(currentGiftForPurchase, reservation.id);
}

function openPixModal(gift, reservationId){
  const modalRoot = document.getElementById('modal-root');
  const hasKey = settings.pixKey && settings.pixKey.trim().length > 0;
  let qrHtml = '';
  if(hasKey){
    qrHtml = `<div id="qrcode-container"></div>`;
  }else{
    qrHtml = `<div class="muted" style="margin-bottom:14px;">Chave Pix ainda não configurada pelos noivos. Fale com eles diretamente.</div>`;
  }
  modalRoot.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <h2>Pagamento via Pix</h2>
        <div class="muted">Escaneie o QR Code ou copie a chave abaixo no app do seu banco.</div>
        <div class="pix-box">
          ${qrHtml}
          <div style="font-size:14px;color:var(--text-soft);margin-bottom:2px;">Valor a pagar</div>
          <div style="font-size:22px;font-weight:700;color:var(--rose-dark);margin-bottom:14px;">${formatBRL(gift.price)}</div>
          ${hasKey ? `
          <div class="pix-key-row">
            <span id="pix-key-text">${escapeHtml(settings.pixKey)}</span>
            <button class="copy-btn" onclick="copyPixKey()">Copiar chave</button>
          </div>
          <div style="font-size:12.5px;color:var(--text-soft);margin-top:8px;">Titular: ${escapeHtml(settings.accountName)}</div>
          ` : ''}
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-sage" onclick="confirmPayment('${reservationId}')">Pagamento Realizado</button>
        </div>
      </div>
    </div>
  `;
  if(hasKey){
    try{
      const payload = buildPixPayload({
        pixKey: settings.pixKey,
        name: settings.accountName,
        city: settings.city,
        amount: gift.price,
        txid: reservationId
      });
      new QRCode(document.getElementById('qrcode-container'), {
        text: payload, width: 200, height: 200,
        correctLevel: QRCode.CorrectLevel.M
      });
      window._currentPixPayload = payload;
    }catch(e){
      document.getElementById('qrcode-container').innerHTML = '<div class="muted">Não foi possível gerar o QR Code agora.</div>';
    }
  }
}

function copyPixKey(){
  const text = window._currentPixPayload || settings.pixKey;
  navigator.clipboard.writeText(text).then(()=> showToast('Código copiado')).catch(()=> showToast('Não foi possível copiar'));
}

function confirmPayment(reservationId){
  const r = reservations.find(x=>x.id===reservationId);
  if(r){ r.status = 'confirmado'; saveReservations(); }
  openThanksModal();
}

function openThanksModal(){
  const modalRoot = document.getElementById('modal-root');
  modalRoot.innerHTML = `
    <div class="modal-overlay">
      <div class="modal" style="text-align:center;">
        <div class="thanks-icon">🤍</div>
        <div class="thanks-text">Obrigado pelo carinho! Agradecemos seu presente e desejamos que Deus retribua em dobro. Estamos ansiosos para nos encontrarmos no nosso tão esperado dia.</div>
        <div class="modal-actions" style="margin-top:26px;">
          <button class="btn btn-primary" style="flex:none; padding:12px 32px;" onclick="closeModal()">Fechar</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

/* ================= ADMIN: LOGIN ================= */
function openAdminLogin(){
  const modalRoot = document.getElementById('modal-root');
  modalRoot.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h2>Área dos noivos</h2>
        <div class="muted">Digite a senha de administração.</div>
        <div class="field">
          <label>Senha</label>
          <input id="admin-pass" type="password" onkeydown="if(event.key==='Enter') tryAdminLogin()">
        </div>
        <div id="admin-login-error" class="error-msg">Senha incorreta.</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="tryAdminLogin()">Entrar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('admin-pass').focus();
}
function tryAdminLogin(){
  const val = document.getElementById('admin-pass').value;
  if(val === settings.adminPassword){
    adminAuthed = true;
    view = 'admin';
    closeModal();
    render();
  }else{
    document.getElementById('admin-login-error').style.display = 'block';
  }
}
function logoutAdmin(){
  adminAuthed = false;
  view = 'guest';
  render();
}

/* ================= ADMIN: GIFTS TAB ================= */
function renderAdminGiftsTab(){
  const sorted = [...gifts].sort((a,b)=>a.order-b.order);
  const rows = sorted.map((g, idx) => `
    <div class="admin-gift-row">
      <img class="admin-thumb" src="${g.image || PLACEHOLDER_IMG}" alt="">
      <div class="admin-fields">
        <input class="name-input" value="${escapeHtml(g.name)}" oninput="updateGiftField('${g.id}','name',this.value)">
        <input class="price-input" type="number" step="0.01" min="0" value="${g.price}" oninput="updateGiftField('${g.id}','price',this.value)">
        <label class="file-btn">
          Alterar foto
          <input type="file" accept="image/*" style="display:none" onchange="handleGiftImageChange('${g.id}', this)">
        </label>
      </div>
      <div class="row-actions">
        <button class="icon-btn" ${idx===0?'disabled':''} onclick="moveGift('${g.id}',-1)" title="Mover para cima">↑</button>
        <button class="icon-btn" ${idx===sorted.length-1?'disabled':''} onclick="moveGift('${g.id}',1)" title="Mover para baixo">↓</button>
        <button class="icon-btn danger" onclick="removeGift('${g.id}')" title="Remover">✕</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="panel">
      <h3>Presentes cadastrados</h3>
      ${sorted.length ? rows : '<div class="muted">Nenhum presente cadastrado ainda.</div>'}
      <div class="add-gift-form">
        <div class="row">
          <input class="name-input" id="new-gift-name" placeholder="Nome do presente" value="${escapeHtml(newGiftDraft.name)}" oninput="newGiftDraft.name=this.value">
          <input class="price-input" id="new-gift-price" type="number" step="0.01" min="0" placeholder="Valor (R$)" value="${escapeHtml(newGiftDraft.price)}" oninput="newGiftDraft.price=this.value">
        </div>
        <div class="row" style="align-items:center;">
          <label class="file-btn">
            Importar foto
            <input type="file" accept="image/*" style="display:none" onchange="handleNewGiftImage(this)">
          </label>
          ${newGiftDraft.image ? `<img class="preview-thumb" src="${newGiftDraft.image}">` : ''}
          <button class="btn btn-primary" style="flex:none;padding:10px 20px;" onclick="addNewGift()">Adicionar presente</button>
        </div>
      </div>
    </div>
  `;
}

function updateGiftField(id, field, value){
  const g = gifts.find(x=>x.id===id);
  if(!g) return;
  g[field] = field === 'price' ? (parseFloat(value)||0) : value;
  clearTimeout(window._giftSaveTimer);
  window._giftSaveTimer = setTimeout(()=>{ saveGifts(); renderAdminBody(); }, 500);
}

function handleGiftImageChange(id, inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const g = gifts.find(x=>x.id===id);
    if(g){ g.image = e.target.result; saveGifts(); renderAdminBody(); }
  };
  reader.readAsDataURL(file);
}

function handleNewGiftImage(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    newGiftDraft.image = e.target.result;
    renderAdminBody();
  };
  reader.readAsDataURL(file);
}

function addNewGift(){
  const name = (newGiftDraft.name||'').trim();
  const price = parseFloat(newGiftDraft.price);
  if(!name || isNaN(price) || price <= 0){
    showToast('Preencha nome e valor válidos');
    return;
  }
  gifts.push({
    id: uid(),
    name,
    price,
    image: newGiftDraft.image || PLACEHOLDER_IMG,
    order: gifts.length
  });
  newGiftDraft = { name: "", price: "", image: "" };
  saveGifts();
  renderAdminBody();
}

function moveGift(id, direction){
  const sorted = [...gifts].sort((a,b)=>a.order-b.order);
  const idx = sorted.findIndex(g=>g.id===id);
  const swapIdx = idx + direction;
  if(swapIdx < 0 || swapIdx >= sorted.length) return;
  const tmp = sorted[idx].order;
  sorted[idx].order = sorted[swapIdx].order;
  sorted[swapIdx].order = tmp;
  saveGifts();
  renderAdminBody();
}

function removeGift(id){
  if(!confirm('Remover este presente da lista? Esta ação não pode ser desfeita.')) return;
  gifts = gifts.filter(g=>g.id!==id);
  saveGifts();
  renderAdminBody();
}

/* ================= ADMIN: RESERVATIONS TAB ================= */
function renderAdminReservationsTab(){
  const sorted = [...reservations].sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
  if(sorted.length === 0){
    return `<div class="panel"><h3>Reservas e mensagens</h3><div class="muted">Nenhuma reserva registrada ainda.</div></div>`;
  }
  const rows = sorted.map(r => `
    <tr>
      <td>${escapeHtml(r.guestName)}<br><span style="color:var(--text-soft);font-size:12px;">${escapeHtml(r.guestEmail)}</span></td>
      <td>${escapeHtml(r.giftName)}</td>
      <td>${formatBRL(r.amount)}</td>
      <td><span class="status-pill ${r.status}">${r.status === 'confirmado' ? 'Confirmado' : 'Aguardando'}</span></td>
      <td class="msg-cell">${escapeHtml(r.message) || '<span style="color:var(--text-soft);">—</span>'}</td>
      <td style="font-size:12px;color:var(--text-soft);">${new Date(r.timestamp).toLocaleString('pt-BR')}</td>
    </tr>
  `).join('');
  return `
    <div class="panel">
      <h3>Reservas e mensagens</h3>
      <div style="overflow-x:auto;">
        <table class="res-table">
          <thead><tr><th>Convidado</th><th>Presente</th><th>Valor</th><th>Status</th><th>Mensagem</th><th>Data</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

/* ================= ADMIN: SETTINGS TAB ================= */
function renderAdminSettingsTab(){
  return `
    <div class="panel">
      <h3>Configurações de pagamento</h3>
      <div class="settings-grid">
        <div class="field">
          <label>Chave Pix</label>
          <input id="set-pixkey" value="${escapeHtml(settings.pixKey)}" placeholder="CPF, e-mail, telefone ou chave aleatória">
        </div>
        <div class="field">
          <label>Nome do titular da conta</label>
          <input id="set-name" value="${escapeHtml(settings.accountName)}">
        </div>
        <div class="field">
          <label>Cidade do titular</label>
          <input id="set-city" value="${escapeHtml(settings.city)}">
        </div>
        <div class="field">
          <label>Senha de acesso ao admin</label>
          <input id="set-password" value="${escapeHtml(settings.adminPassword)}">
        </div>
      </div>
      <button class="btn btn-primary save-settings-btn" style="flex:none;padding:11px 24px;" onclick="saveSettingsForm()">Salvar configurações</button>
      <div class="muted" style="margin-top:14px;">
        Atenção: esta é uma senha simples de proteção do painel — adequada para uso familiar, mas não é um sistema de segurança robusto. Evite reutilizar uma senha sensível aqui.
      </div>
    </div>
  `;
}
function saveSettingsForm(){
  settings.pixKey = document.getElementById('set-pixkey').value.trim();
  settings.accountName = document.getElementById('set-name').value.trim();
  settings.city = document.getElementById('set-city').value.trim();
  settings.adminPassword = document.getElementById('set-password').value;
  saveSettings();
}

/* ================= ADMIN SHELL ================= */
function renderAdminBody(){
  const body = document.getElementById('admin-body');
  if(!body) return;
  if(adminTab === 'gifts') body.innerHTML = renderAdminGiftsTab();
  else if(adminTab === 'reservations') body.innerHTML = renderAdminReservationsTab();
  else body.innerHTML = renderAdminSettingsTab();
}
function setAdminTab(tab){ adminTab = tab; render(); }

function renderAdminView(){
  return `
    <div class="admin-shell">
      <div class="admin-top">
        <h2 style="font-style:italic;">Painel dos noivos</h2>
        <div style="display:flex; gap:10px;">
          <button class="tab-btn" onclick="view='guest'; render();">Ver site</button>
          <button class="tab-btn" onclick="logoutAdmin()">Sair</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn ${adminTab==='gifts'?'active':''}" onclick="setAdminTab('gifts')">Presentes</button>
        <button class="tab-btn ${adminTab==='reservations'?'active':''}" onclick="setAdminTab('reservations')">Reservas e Mensagens</button>
        <button class="tab-btn ${adminTab==='settings'?'active':''}" onclick="setAdminTab('settings')">Configurações</button>
      </div>
      <div id="admin-body"></div>
    </div>
  `;
}

/* ================= MAIN RENDER ================= */
function render(){
  const app = document.getElementById('app');
  if(view === 'admin' && adminAuthed){
    app.innerHTML = renderAdminView();
    renderAdminBody();
  }else{
    view = 'guest';
    app.innerHTML = renderGuestView();
  }
}

/* ================= INIT ================= */
(async function init(){
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;color:#8A7680;">Carregando...</div>';
  await loadAll();
  render();
  if(window.location.hash === '#admin'){ openAdminLogin(); }
})();
</script>
</body>
</html>
